<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1024, height=500" />
  <title>MYXCROW Feature Graphic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1024px; height: 500px; overflow: hidden; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1f1414 0%, #331518 35%, #160f10 70%, #0a0a0a 100%);
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 70% 50%, rgba(143,33,38,0.25) 0%, transparent 50%);
      pointer-events: none;
    }
    .content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 960px;
      padding: 0 48px;
      position: relative;
      z-index: 1;
    }
    .left {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .logo-wrap {
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.08);
      border-radius: 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .logo-wrap img { width: 80px; height: 80px; object-fit: contain; }
    .copy h1 {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 42px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 8px;
    }
    .copy .tagline {
      font-size: 20px;
      font-weight: 600;
      color: #c9a227;
      letter-spacing: 0.02em;
    }
    .copy .sub {
      font-size: 16px;
      color: rgba(255,255,255,0.75);
      margin-top: 6px;
    }
    .badge {
      display: inline-block;
      padding: 10px 20px;
      background: linear-gradient(135deg, #8f2126 0%, #59191f 100%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      font-weight: 700;
      border-radius: 999px;
      letter-spacing: 0.04em;
      box-shadow: 0 4px 16px rgba(143,33,38,0.5);
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="left">
      <div class="logo-wrap">
        <img src="logo/MYXCROWLOGO.png" alt="MYXCROW" />
      </div>
      <div class="copy">
        <h1>MYXCROW</h1>
        <p class="tagline">Secure Escrow for Safe Transactions</p>
        <p class="sub">Protect your payments. Trusted in Ghana and beyond.</p>
        <div class="badge" style="margin-top: 16px;">GHS · Secure · Trusted</div>
      </div>
    </div>
  </div>
</body>
</html>
