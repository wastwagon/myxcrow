<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=512, height=512" />
  <title>MYXCROW App Icon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 512px; height: 512px; overflow: hidden; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #331518 0%, #1f1414 50%, #160f10 100%);
    }
    .icon-wrap {
      width: 320px;
      height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.06);
      border-radius: 64px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .icon-wrap img {
      width: 200px;
      height: 200px;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="icon-wrap">
    <img src="logo/MYXCROWLOGO.png" alt="MYXCROW" />
  </div>
</body>
</html>
